<!DOCTYPE html>
<!--
  examples/fitness-animation.html
  Demonstrates real-time fitness animation — sinusoidal fitness updates
  drive vertex displacement every animation frame.

  Usage:
    npx serve .   (from repo root)
    open http://localhost:3000/examples/fitness-animation.html
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phyloid — Fitness Animation Example</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #060620; font-family: system-ui, sans-serif; color: #e0e0f0; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #info { position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 8px;
            border: 1px solid rgba(100,200,180,0.3); font-size: 0.85rem;
            color: #00ffaa; text-align: center; pointer-events: none; }
  </style>
</head>
<body>
  <div id="info">Phyloid Fitness Animation — vertices pulse with sinusoidal fitness</div>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x060620);

    const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 100);
    camera.position.set(0, 0, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0x303060, 0.8));
    const dir = new THREE.DirectionalLight(0xffffff, 1.0);
    dir.position.set(5, 5, 5); scene.add(dir);
    const pt1 = new THREE.PointLight(0x00ffaa, 0.6, 15);
    pt1.position.set(-3, 2, 3); scene.add(pt1);
    const pt2 = new THREE.PointLight(0x0055ff, 0.4, 15);
    pt2.position.set(3, -2, 3); scene.add(pt2);

    // Create 3 phyloid organisms with different base geometries
    const organisms = [];
    const positions = [[-2.5, 0, 0], [0, 0, 0], [2.5, 0, 0]];
    const baseColors = [[0.1, 0.9, 0.5], [0.8, 0.2, 0.9], [0.9, 0.6, 0.1]];
    const phases = [0, Math.PI * 0.6, Math.PI * 1.3]; // different animation phases

    positions.forEach((pos, idx) => {
      const geo = new THREE.IcosahedronGeometry(0.9, 3);
      const posAttr = geo.getAttribute('position');
      const origPositions = new Float32Array(posAttr.array);
      const count = posAttr.count;
      const colors = new Float32Array(count * 3);
      geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      const mat = new THREE.MeshPhongMaterial({
        vertexColors: true, flatShading: true,
        shininess: 80, transparent: true, opacity: 0.9,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(...pos);
      scene.add(mesh);
      organisms.push({ mesh, origPositions, count, baseColor: baseColors[idx], phase: phases[idx] });
    });

    const clock = new THREE.Clock();

    function updateOrganism({ mesh, origPositions, count, baseColor, phase }) {
      const t = clock.getElapsedTime() + phase;
      const geo = mesh.geometry;
      const posAttr = geo.getAttribute('position');
      const positions = posAttr.array;
      const colorAttr = geo.getAttribute('color');
      const colors = colorAttr.array;

      for (let i = 0; i < count; i++) {
        const ox = origPositions[i*3], oy = origPositions[i*3+1], oz = origPositions[i*3+2];
        const len = Math.sqrt(ox*ox + oy*oy + oz*oz) || 1;

        // Sinusoidal fitness based on vertex index + time
        const f = 0.5 + 0.5 * Math.sin(t * 2 + i * 0.3);
        const displacement = (f - 0.5) * 0.4;

        positions[i*3]   = ox + (ox/len) * displacement;
        positions[i*3+1] = oy + (oy/len) * displacement;
        positions[i*3+2] = oz + (oz/len) * displacement;

        // Color: low fitness = red tint, high = base color
        colors[i*3]   = baseColor[0] * (1-f) + f;
        colors[i*3+1] = baseColor[1] * f;
        colors[i*3+2] = baseColor[2] * f * 0.8;
      }

      posAttr.needsUpdate = true;
      colorAttr.needsUpdate = true;
      geo.computeVertexNormals();
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      organisms.forEach((org) => {
        updateOrganism(org);
        org.mesh.rotation.y += dt * 0.4;
        org.mesh.rotation.x += dt * 0.15;
      });
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
