<!DOCTYPE html>
<!--
  examples/basic-world.html
  Minimal standalone example: generate a Phyloid world from a text prompt.
  No build step required — loads Three.js from CDN.

  Usage:
    npx serve .   (from repo root)
    open http://localhost:3000/examples/basic-world.html
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phyloid — Basic World Example</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a2e; color: #e0e0f0; font-family: system-ui, sans-serif;
           display: flex; flex-direction: column; height: 100vh; }
    header { padding: 16px 24px; background: rgba(0,0,0,0.4);
             border-bottom: 1px solid rgba(100,200,180,0.2); }
    header h1 { font-size: 1.2rem; color: #00ffaa; margin-bottom: 4px; }
    header p { font-size: 0.8rem; color: #888; }
    .controls { display: flex; gap: 8px; padding: 12px 24px;
                background: rgba(0,0,0,0.3); }
    #prompt { flex: 1; padding: 8px 12px; background: rgba(255,255,255,0.07);
              border: 1px solid rgba(100,200,180,0.3); border-radius: 6px;
              color: #e0e0f0; font-size: 0.9rem; }
    #generate { padding: 8px 20px; background: linear-gradient(135deg,#00ffaa,#00aaff);
                color: #0a0a2e; border: none; border-radius: 6px;
                font-weight: 600; cursor: pointer; }
    #status { padding: 4px 24px; font-size: 0.75rem; color: #66cc99; min-height: 20px; }
    #canvas-container { flex: 1; position: relative; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <header>
    <h1>Phyloid — Basic World Example</h1>
    <p>Type a natural-language description to generate 3D phylogenetic organisms.</p>
  </header>
  <div class="controls">
    <input id="prompt" type="text"
      value="swarm of spiky green organisms"
      placeholder="e.g. 3 smooth blue creatures" />
    <button id="generate">Generate</button>
  </div>
  <div id="status"></div>
  <div id="canvas-container"></div>

  <!-- Three.js r128 from CDN (matches repo's pinned version) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script>
    // Inline world generator (subset of src/world/nl-generator.ts)
    const COLOR_MAP = {
      red:[.9,.2,.1], green:[.1,.9,.3], blue:[.1,.3,.9],
      purple:[.6,.1,.8], cyan:[.1,.8,.8], orange:[.9,.5,.1],
      pink:[.9,.3,.6], yellow:[.9,.9,.1], white:[.9,.9,.9],
    };

    function parsePrompt(prompt) {
      const lower = (prompt || '').toLowerCase().slice(0, 512);
      let organisms = 1;
      const numMatch = lower.match(/(\d+)\s+\w.*?(organism|creature|phyloid|shape)s?/);
      if (numMatch) organisms = Math.min(parseInt(numMatch[1]), 20);
      else if (lower.includes('swarm') || lower.includes('many')) organisms = 8;
      else if (lower.includes('pair') || lower.includes('two')) organisms = 2;
      else if (lower.includes('few') || lower.includes('some')) organisms = 4;

      let detail = 2;
      if (lower.includes('simple') || lower.includes('basic')) detail = 1;
      else if (lower.includes('smooth') || lower.includes('detailed')) detail = 3;
      else if (lower.includes('complex') || lower.includes('intricate')) detail = 4;

      let profile = 'random';
      if (lower.includes('spiky') || lower.includes('rough')) profile = 'spiky';
      else if (lower.includes('smooth') || lower.includes('gradient')) profile = 'gradient';
      else if (lower.includes('uniform') || lower.includes('flat')) profile = 'uniform';

      let color = null;
      for (const [k, v] of Object.entries(COLOR_MAP)) if (lower.includes(k)) { color = v; break; }

      let scale = 1;
      if (lower.includes('tiny') || lower.includes('small')) scale = 0.4;
      else if (lower.includes('large') || lower.includes('huge')) scale = 1.8;
      else if (lower.includes('giant')) scale = 2.5;

      return { organisms, detail, profile, color, scale };
    }

    function genFitness(count, profile) {
      const arr = new Array(count);
      if (profile === 'uniform') return arr.fill(0.7);
      if (profile === 'gradient') { for (let i=0;i<count;i++) arr[i]=count>1?i/(count-1):0.5; return arr; }
      if (profile === 'spiky') { for (let i=0;i<count;i++) arr[i]=i%3===0?.95:.2; return arr; }
      for (let i=0;i<count;i++) arr[i]=Math.random(); return arr;
    }

    // Three.js scene setup
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);
    const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 0, 6);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0x404060, 0.6));
    const dir = new THREE.DirectionalLight(0xffffff, 0.8);
    dir.position.set(5, 5, 5); scene.add(dir);
    const pt = new THREE.PointLight(0x00ffaa, 0.4, 20);
    pt.position.set(-3, 2, 4); scene.add(pt);

    const meshes = [];

    function clearMeshes() {
      meshes.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
      meshes.length = 0;
    }

    function generate(prompt) {
      clearMeshes();
      const { organisms, detail, profile, color, scale } = parsePrompt(prompt);
      const geo0 = new THREE.IcosahedronGeometry(1, detail);
      const vertCount = geo0.getAttribute('position').count;
      geo0.dispose();
      document.getElementById('status').textContent =
        `Generating ${organisms} organism(s)…`;

      for (let i = 0; i < organisms; i++) {
        const fitness = genFitness(vertCount, profile);
        const geo = new THREE.IcosahedronGeometry(scale * (0.8 + Math.random()*0.4), detail);
        const pos = geo.getAttribute('position');
        const colors = new Float32Array(pos.count * 3);
        const c = color || [Math.random()*.8+.1, Math.random()*.8+.1, Math.random()*.8+.1];
        for (let v = 0; v < pos.count; v++) {
          const f = Math.max(0, Math.min(1, fitness[v % fitness.length] || 0.5));
          colors[v*3] = c[0]*(1-f)+f; colors[v*3+1] = c[1]*f; colors[v*3+2] = c[2]*f*.8;
        }
        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const mat = new THREE.MeshPhongMaterial({ vertexColors: true, flatShading: true,
          shininess: 60, transparent: true, opacity: 0.92 });
        const mesh = new THREE.Mesh(geo, mat);
        const angle = (i / organisms) * Math.PI * 2;
        const r = organisms > 1 ? 2 + organisms * 0.15 : 0;
        mesh.position.set(Math.cos(angle)*r, 0, Math.sin(angle)*r);
        scene.add(mesh); meshes.push(mesh);
      }

      camera.position.set(0, 2, 5 + organisms * 0.3);
      camera.lookAt(0, 0, 0);
      document.getElementById('status').textContent =
        `${organisms} organism(s) generated`;
    }

    function animate() {
      requestAnimationFrame(animate);
      meshes.forEach(m => { m.rotation.y += 0.005; m.rotation.x += 0.002; });
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      const w = container.clientWidth, h = container.clientHeight;
      camera.aspect = w/h; camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });

    document.getElementById('generate').addEventListener('click', () => {
      generate(document.getElementById('prompt').value);
    });
    document.getElementById('prompt').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') generate(e.target.value);
    });

    // Auto-generate on load
    generate(document.getElementById('prompt').value);
  </script>
</body>
</html>
