<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a2e" />
  <meta name="description" content="Phyloid — Generate and explore fitness-mapped 3D phylogenetic organisms" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Phyloid — 3D Fitness Organisms</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
    body { background: #0a0a2e; color: #e0e0f0; }
    #app { width: 100vw; height: 100vh; position: relative; }
    canvas { display: block; }

    .phyloid-panel {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(10, 10, 46, 0.85); backdrop-filter: blur(12px);
      border: 1px solid rgba(100, 200, 180, 0.2); border-radius: 16px;
      padding: 20px 28px; min-width: 360px; max-width: 90vw;
      z-index: 10; text-align: center;
    }
    .phyloid-panel h1 {
      font-size: 1.6rem; font-weight: 700; letter-spacing: 0.08em;
      background: linear-gradient(135deg, #00ffaa, #00aaff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .subtitle { font-size: 0.85rem; color: #8888aa; margin-bottom: 16px; }
    .input-row { display: flex; gap: 8px; }
    #nl-prompt {
      flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid rgba(100,200,180,0.3);
      background: rgba(255,255,255,0.06); color: #e0e0f0; font-size: 0.95rem;
      outline: none; transition: border-color 0.2s;
    }
    #nl-prompt:focus { border-color: #00ffaa; }
    #nl-prompt::placeholder { color: #666688; }
    #generate-btn {
      padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer;
      background: linear-gradient(135deg, #00ffaa, #00aaff); color: #0a0a2e;
      font-weight: 600; font-size: 0.95rem; transition: opacity 0.2s;
    }
    #generate-btn:hover { opacity: 0.85; }
    .stats { margin-top: 10px; font-size: 0.8rem; color: #66cc99; min-height: 1.2em; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
